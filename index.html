<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aline Voltareli | Links</title>

  <meta
    name="description"
    content="Terapia, Eneagrama e protagonismo feminino."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- VIDEO DE FUNDO -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="video/VIDEO TESTE.mp4" type="video/mp4" />
  </video>

  <main class="bio-page">
    <section class="bio-card">

      <div class="bio-top"></div>

      <div class="bio-header">
        <div class="avatar-wrap">
          <img src="img/FOTO ALINE 4.JPG" alt="Aline Voltareli" class="avatar" />
        </div>

        <p class="eyebrow">Terapia • Eneagrama • Feminino</p>
        <h1>Aline Voltareli</h1>
        <p class="bio-text">
          Autoconhecimento com profundidade, direção e vida real.
        </p>
      </div>

      <!-- LIVRO -->
      <div class="featured-book">
        <div class="featured-book-text">
          <span class="featured-label">Meu livro</span>
          <h2>As Nove Faces do Feminino</h2>
          <p>Um mergulho no Eneagrama sob o olhar do ser mulher.</p>
        </div>

        <a
          href="https://aline-voltareli-almeida.herospark.co/as-nove-faces-do-feminino-o-eneagrama-e-o-ser-mulher"
          target="_blank"
          class="featured-btn"
        >
          Comprar livro
        </a>
      </div>

      <!-- LINKS -->
      <div class="bio-links">

        <!-- WEBSITE -->
        <div class="bio-item">
          <button class="bio-btn featured-main expandable" type="button">
            <div class="bio-btn-inner">
              <div class="bio-icon">
                <svg viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="9" stroke="white" stroke-width="2"/>
                  <path d="M3 12h18" stroke="white" stroke-width="2"/>
                </svg>
              </div>
              <div class="bio-btn-text">
                <span>Website</span>
                <small>Agendar e conhecer meu trabalho</small>
              </div>
              <div class="bio-toggle">+</div>
            </div>
          </button>

          <div class="bio-expand">
            <a href="https://seusite.com" target="_blank" class="bio-open-link">
              Acessar site
            </a>
          </div>
        </div>

        <!-- WHATSAPP -->
        <div class="bio-item">
          <button class="bio-btn expandable" type="button">
            <div class="bio-btn-inner">
              <div class="bio-icon">
                <svg viewBox="0 0 32 32">
                  <path fill="white" d="M16 .4C7.4.4.4 7.4.4 16c0 2.8.7 5.4 2 7.7L0 32l8.5-2.2c2.2 1.2 4.7 1.8 7.3 1.8 8.6 0 15.6-7 15.6-15.6S24.6.4 16 .4z"/>
                </svg>
              </div>
              <div class="bio-btn-text">
                <span>WhatsApp</span>
                <small>Fale com a minha equipe</small>
              </div>
              <div class="bio-toggle">+</div>
            </div>
          </button>

          <div class="bio-expand">
            <a href="https://wa.me/5512992334020" target="_blank" class="bio-open-link">
              Abrir WhatsApp
            </a>
          </div>
        </div>

        <!-- PODCAST -->
        <div class="bio-item">
          <button class="bio-btn expandable" type="button">
            <div class="bio-btn-inner">
              <div class="bio-icon">
                <svg viewBox="0 0 24 24">
                  <path fill="white"
                    d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.6 3.5 12 3.5 12 3.5s-7.6 0-9.4.6A3 3 0 0 0 .5 6.2 31.7 31.7 0 0 0 0 12a31.7 31.7 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.8.6 9.4.6 9.4.6s7.6 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.7 31.7 0 0 0 24 12z"/>
                </svg>
              </div>
              <div class="bio-btn-text">
                <span>Podcast</span>
                <small>TPM no Ar</small>
              </div>
              <div class="bio-toggle">+</div>
            </div>
          </button>

          <div class="bio-expand">
            <a href="https://www.youtube.com/watch?v=a0RQHk4-HLc" target="_blank" class="bio-open-link">
              Assistir episódio
            </a>
          </div>
        </div>

      </div>

      <footer class="bio-footer">
        <p>© Aline Voltareli</p>
      </footer>

    </section>
  </main>

  <!-- SCRIPT -->
  <script>
    const bioItems = document.querySelectorAll(".bio-item");

    bioItems.forEach((item) => {
      const button = item.querySelector(".expandable");

      button.addEventListener("click", () => {
        const isActive = item.classList.contains("active");

        bioItems.forEach((other) => {
          other.classList.remove("active");
        });

        if (!isActive) {
          item.classList.add("active");
        }
      });
    });
  </script>

</body>
</html>
